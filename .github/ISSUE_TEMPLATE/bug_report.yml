name: Bug report
description: Report reproducible CodexSwap behavior that is not working as expected.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not paste Codex auth files, access tokens, account identifiers, or other credentials.
  - type: input
    id: version
    attributes:
      label: CodexSwap version
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac architecture
      placeholder: macOS 14.6, Apple silicon
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest repeatable sequence without private account data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove credentials and personal account details before attaching anything.
      render: shell
